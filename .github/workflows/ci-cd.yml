name: SplitFlow CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── Job 1: Rust Smart Contract Checks ─────────────────────────────────────
  contracts:
    name: Smart Contracts — Lint, Test & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain (stable + wasm32)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: wasm32-unknown-unknown
          components: clippy, rustfmt

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --all -- --check
        working-directory: ./contracts

      - name: Lint with Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
        working-directory: ./contracts

      - name: Run unit tests
        run: cargo test --workspace
        working-directory: ./contracts

      - name: Build WASM artifacts
        run: cargo build --target wasm32-unknown-unknown --release --workspace
        working-directory: ./contracts

      - name: Upload WASM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wasm-artifacts
          path: contracts/*/target/wasm32-unknown-unknown/release/*.wasm
          retention-days: 7

  # ── Job 2: Frontend Lint, Type-check & Test ────────────────────────────────
  frontend:
    name: Frontend — Lint, TypeCheck & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ./frontend

      - name: Type check
        run: npx tsc --noEmit
        working-directory: ./frontend

      - name: Run tests
        run: npm test
        working-directory: ./frontend

      - name: Build production bundle
        run: npm run build
        working-directory: ./frontend
        env:
          NEXT_PUBLIC_SOROBAN_RPC_URL: https://soroban-testnet.stellar.org
          NEXT_PUBLIC_NETWORK_PASSPHRASE: "Test SDF Network ; September 2015"
          NEXT_PUBLIC_MANAGER_CONTRACT_ID: ${{ secrets.TESTNET_MANAGER_CONTRACT_ID || 'PLACEHOLDER' }}
          NEXT_PUBLIC_DISTRIBUTOR_CONTRACT_ID: ${{ secrets.TESTNET_DISTRIBUTOR_CONTRACT_ID || 'PLACEHOLDER' }}
          NEXT_PUBLIC_XLM_SAC_ID: CDLZFC3SYJYDZT7K67VZ75HPJVIEUVNIXF47ZG2FB2RMQQVU2HHGCYSC

  # ── Job 3: Security Audit ─────────────────────────────────────────────────
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    needs: [contracts, frontend]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ./frontend

      - name: Audit npm packages
        run: npm audit --audit-level=high
        working-directory: ./frontend
        continue-on-error: true

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Audit Cargo crates
        run: |
          cargo install cargo-audit --locked 2>/dev/null || true
          cargo audit
        working-directory: ./contracts
        continue-on-error: true

  # ── Job 4: Deploy to Testnet (main branch only) ────────────────────────────
  deploy-testnet:
    name: Deploy to Stellar Testnet
    runs-on: ubuntu-latest
    needs: [contracts, frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: testnet

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust + wasm32 target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build WASM
        run: cargo build --target wasm32-unknown-unknown --release --workspace
        working-directory: ./contracts

      - name: Install Stellar CLI
        run: cargo install --locked stellar-cli --features opt

      - name: Deploy contracts to Testnet
        env:
          DEPLOYER_SECRET_KEY: ${{ secrets.TESTNET_DEPLOYER_SECRET_KEY }}
        run: |
          MANAGER_ID=$(stellar contract deploy \
            --wasm contracts/royalty_manager/target/wasm32-unknown-unknown/release/royalty_manager.wasm \
            --network testnet \
            --source-account $DEPLOYER_SECRET_KEY \
            --fee 1000000)

          DISTRIBUTOR_ID=$(stellar contract deploy \
            --wasm contracts/royalty_distributor/target/wasm32-unknown-unknown/release/royalty_distributor.wasm \
            --network testnet \
            --source-account $DEPLOYER_SECRET_KEY \
            --fee 1000000)

          echo "MANAGER_CONTRACT_ID=$MANAGER_ID" >> $GITHUB_OUTPUT
          echo "DISTRIBUTOR_CONTRACT_ID=$DISTRIBUTOR_ID" >> $GITHUB_OUTPUT
          echo "Deployed: Manager=$MANAGER_ID  Distributor=$DISTRIBUTOR_ID"
        id: deploy

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: ./frontend

      - name: Build frontend with deployed contract IDs
        run: npm run build
        working-directory: ./frontend
        env:
          NEXT_PUBLIC_SOROBAN_RPC_URL: https://soroban-testnet.stellar.org
          NEXT_PUBLIC_NETWORK_PASSPHRASE: "Test SDF Network ; September 2015"
          NEXT_PUBLIC_MANAGER_CONTRACT_ID: ${{ steps.deploy.outputs.MANAGER_CONTRACT_ID }}
          NEXT_PUBLIC_DISTRIBUTOR_CONTRACT_ID: ${{ steps.deploy.outputs.DISTRIBUTOR_CONTRACT_ID }}
          NEXT_PUBLIC_XLM_SAC_ID: CDLZFC3SYJYDZT7K67VZ75HPJVIEUVNIXF47ZG2FB2RMQQVU2HHGCYSC

      - name: Print explorer links
        run: |
          echo "🔗 Explorer links:"
          echo "  Manager:     https://stellar.expert/explorer/testnet/contract/${{ steps.deploy.outputs.MANAGER_CONTRACT_ID }}"
          echo "  Distributor: https://stellar.expert/explorer/testnet/contract/${{ steps.deploy.outputs.DISTRIBUTOR_CONTRACT_ID }}"
